  summary: |-
    He-W 704.05 governs activation of electronic accounts containing the casehead's electronic notices of decisions (NODs) and other confidential case information through the department's eligibility web portal. It identifies who may activate the account (casehead; guardian/conservator/protective payee; AR or power of attorney; organization acting in those roles), the registration steps and information an organization must provide, the rule that a casehead loses portal access once an organization is granted access, the organization's responsibility for email security when electing electronic-only NODs, parity of paper and electronic NOD content, and the written-request procedure for reestablishing paper NODs via USPS.
