  source_verification:
    corpus_citation_path: us-nh/regulation/he-w-700/He-W 722.01
  summary: |-
    All households shall have the option to participate in a telephone interview in lieu of a face-to-face interview, in accordance with 7 CFR 273.2(e)(2). The casehead or authorized representative shall review the summary of information provided during the interview and make any corrections, if needed.
  status: deferred
  deferred_outputs:
    - output: us-nh:regulations/he-w-700/He-W 722/01#telephone_interview_option_available
      reason: |-
        He-W 722.01(a) grants every household the option of a telephone interview in lieu of a face-to-face interview, and (b) imposes an administrative duty on the casehead or authorized representative to review the interview summary. Neither paragraph defines a calculable benefit amount, eligibility test, or condition affecting computation; both are purely administrative/procedural rules. Per the encoding guidance ("Do not create an output for administrative clauses ... Unless the source defines a calculable benefit, amount, condition, or exception, keep that text documentary in `module.summary`."), no executable rule is appropriate.
